name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-studio:
    name: Deploy Studio to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: .
        run: npx wrangler pages deploy studio/dist --project-name=lapak-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
